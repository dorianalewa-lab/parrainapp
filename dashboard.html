<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParrainApp — Dashboard (bientôt disponible)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #5B21B6;
    --purple-light: #EDE9FE;
    --purple-mid: #7C3AED;
    --dark: #1E1B4B;
    --gray: #6B7280;
    --light: #F9F8FF;
    --white: #FFFFFF;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    color: var(--dark);
  }
  .card {
    background: var(--white);
    border-radius: 24px;
    max-width: 420px;
    width: 100%;
    padding: 48px 32px;
    box-shadow: 0 4px 40px rgba(91,33,182,0.08);
    text-align: center;
  }
  .icon {
    width: 72px;
    height: 72px;
    background: var(--purple-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    margin-bottom: 12px;
  }
  h1 span { color: var(--purple); }
  p {
    font-size: 15px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .powered {
    margin-top: 32px;
    font-size: 12px;
    color: #C4B5FD;
  }
  .powered span { color: var(--purple); font-weight: 500; }
</style>
</head>
<body>

<div class="card">
  <div class="icon">🛠️</div>
  <h1>Dashboard <span>en cours de reconstruction</span></h1>
  <p>Nous mettons en place une authentification sécurisée et un vrai isolement multi-salons.</p>
  <p>Reviens très bientôt.</p>
  <p class="powered">Propulsé par <span>ParrainApp</span></p>
</div>

</body>
</html>
